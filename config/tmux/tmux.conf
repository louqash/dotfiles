# TPM plugins
set -g @plugin 'tmux-plugins/tpm'

# Solarized Light colors
# bg: #fdf6e3  fg: #657b83  dim: #eee8d5  green: #859900  muted: #93a1a1
set -g status-style "bg=#fdf6e3,fg=#657b83"
set -g status-left "#[bg=#859900,fg=#fdf6e3,bold] #S #[bg=#fdf6e3] "
set -g status-right "#[fg=#657b83]#{b:pane_current_path}  %d/%m %H:%M:%S "
set -g status-left-length 90

setw -g window-status-format "#[fg=#93a1a1] #W:#I "
setw -g window-status-current-format "#[bg=#657b83,fg=#fdf6e3,bold] #W:#I "

# Pane borders
set -g window-style "bg=#eee8d5"
set -g window-active-style "bg=#fdf6e3"
set -g pane-border-style "fg=#93a1a1"
set -g pane-active-border-style "fg=#859900"

unbind C-b
set-option -g prefix `
bind ` send-prefix

set -g base-index 1
setw -g pane-base-index 1

bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

set -g mouse on
set -g default-terminal "tmux-256color"
set -as terminal-features ",*:hyperlinks:RGB"
set -as terminal-overrides ",xterm*:Tc"

set-option -g allow-rename off
set-option -g allow-set-title off
set-option -g automatic-rename off
set-option -g history-limit 100000

unbind -T copy-mode-vi MouseDragEnd1Pane

setw -g mode-keys vi

# Initialize TPM (keep at the very bottom)
run '~/.tmux/plugins/tpm/tpm'
